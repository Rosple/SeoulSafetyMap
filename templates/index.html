<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>안전 귀가 지도</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #map { width: 100%; height: 100vh; }

        .panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 330px;
            max-height: 88vh;
            overflow-y: auto;
            background: white;
            z-index: 1000;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .panel h2 { margin: 0 0 12px 0; }

        .panel button {
            width: 100%;
            margin: 6px 0;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #2f80ed;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .panel label {
            display: block;
            margin: 10px 0;
            font-size: 15px;
        }

        select {
            width: 100%;
            padding: 9px;
            border-radius: 8px;
            margin: 6px 0 10px 0;
        }

        #routeInfo {
            font-size: 14px;
            line-height: 1.55;
            font-weight: bold;
            white-space: pre-line;
        }

        .score-box {
            background: #f2f6ff;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .legend {
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.7;
        }

        .yellow-dot {
            width: 18px;
            height: 18px;
            background: #ffd400;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        }
    </style>
</head>

<body>

<div class="panel">
    <h2>안전 귀가 지도</h2>
    <p id="status">데이터 불러오는 중...</p>

    <div class="score-box">
        <b>안전 점수 기준</b><br>
        가로등 1점 / CCTV 2점 / 안심벨 3점<br>
        소방서 10점 / 경찰서 20점
    </div>

    <label><b>경로 추천 기준</b></label>
    <select id="routeMode">
        <option value="safest">최안전 경로 우선</option>
        <option value="shortest">최단거리 경로 우선</option>
    </select>

    <button id="currentLocationBtn">현재 위치를 출발지로 설정</button>
    <button id="startBtn">출발지 직접 선택</button>
    <button id="endBtn">목적지 선택</button>

    <p id="routeInfo">출발지와 목적지를 선택하세요.</p>

    <label><input type="checkbox" id="cctvCheck" checked> CCTV 표시</label>
    <label><input type="checkbox" id="streetlightCheck" checked> 가로등 표시</label>
    <label><input type="checkbox" id="safetybellCheck" checked> 안심벨 표시</label>
    <label><input type="checkbox" id="policeCheck" checked> 경찰서 표시</label>
    <label><input type="checkbox" id="firestationCheck" checked> 소방서 표시</label>

    <div class="legend">
        📷 CCTV<br>
        🟡 가로등<br>
        🔔 안심벨<br>
        🛡️ 경찰서<br>
        🚒 소방서<br>
        🟩 추천 경로<br>
        🟧 비교 경로<br>
        🟥 비교 경로
    </div>
</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([37.64, 127.03], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap'
}).addTo(map);

const SAFETY_WEIGHTS = {
    cctv: 2,
    streetlight: 1,
    safetybell: 3,
    police: 20,
    firestation: 10
};

const iconMap = {
    "CCTV": "/static/icons/cctv.png",
    "안심벨": "/static/icons/safetybell.png",
    "경찰서": "/static/icons/police.png",
    "소방서": "/static/icons/firestation.png"
};

function makeImageIcon(imagePath, size) {
    return L.icon({
        iconUrl: imagePath,
        iconSize: [size, size],
        iconAnchor: [size / 2, size],
        popupAnchor: [0, -size / 2]
    });
}

function makeStreetlightIcon() {
    return L.divIcon({
        html: '<div class="yellow-dot"></div>',
        className: "",
        iconSize: [24, 24],
        iconAnchor: [12, 12],
        popupAnchor: [0, -12]
    });
}

function makeFacilityMarker(item, color, popupText) {
    if (popupText === "가로등") {
        return L.marker([item.lat, item.lng], {
            icon: makeStreetlightIcon()
        }).bindPopup("가로등");
    }

    let iconSize = 34;

    if (popupText === "경찰서") iconSize = 60;
    if (popupText === "소방서") iconSize = 38;
    if (popupText === "CCTV") iconSize = 34;
    if (popupText === "안심벨") iconSize = 34;

    return L.marker([item.lat, item.lng], {
        icon: makeImageIcon(iconMap[popupText], iconSize)
    }).bindPopup(item.name ? popupText + "<br>" + item.name : popupText);
}

function makeCluster(data, color, popupText) {
    var cluster = L.markerClusterGroup();

    data.forEach(function(item) {
        cluster.addLayer(makeFacilityMarker(item, color, popupText));
    });

    return cluster;
}

function countFacilitiesAlongRoute(routeLatLngs, facilities, radiusMeter) {
    let count = 0;

    facilities.forEach(function(item) {
        let facilityPoint = L.latLng(item.lat, item.lng);

        for (let i = 0; i < routeLatLngs.length; i++) {
            let routePoint = L.latLng(routeLatLngs[i][0], routeLatLngs[i][1]);

            if (facilityPoint.distanceTo(routePoint) <= radiusMeter) {
                count++;
                break;
            }
        }
    });

    return count;
}

function calculateSafetyScore(routeLatLngs, data, radiusMeter) {
    const counts = {
        cctv: countFacilitiesAlongRoute(routeLatLngs, data.cctv, radiusMeter),
        streetlight: countFacilitiesAlongRoute(routeLatLngs, data.streetlight, radiusMeter),
        safetybell: countFacilitiesAlongRoute(routeLatLngs, data.safetybell, radiusMeter),
        police: countFacilitiesAlongRoute(routeLatLngs, data.police, radiusMeter),
        firestation: countFacilitiesAlongRoute(routeLatLngs, data.firestation, radiusMeter)
    };

    const score =
        counts.cctv * SAFETY_WEIGHTS.cctv +
        counts.streetlight * SAFETY_WEIGHTS.streetlight +
        counts.safetybell * SAFETY_WEIGHTS.safetybell +
        counts.police * SAFETY_WEIGHTS.police +
        counts.firestation * SAFETY_WEIGHTS.firestation;

    return { counts: counts, score: score };
}

fetch("/static/safety_data.json")
    .then(function(response) {
        if (!response.ok) throw new Error("JSON 파일을 불러오지 못했습니다.");
        return response.json();
    })
    .then(function(data) {
        data.police = data.police || [];
        data.firestation = data.firestation || [];

        var cctvLayer = makeCluster(data.cctv, "blue", "CCTV");
        var streetlightLayer = makeCluster(data.streetlight, "orange", "가로등");
        var safetybellLayer = makeCluster(data.safetybell, "green", "안심벨");
        var policeLayer = makeCluster(data.police, "purple", "경찰서");
        var firestationLayer = makeCluster(data.firestation, "red", "소방서");

        map.addLayer(cctvLayer);
        map.addLayer(streetlightLayer);
        map.addLayer(safetybellLayer);
        map.addLayer(policeLayer);
        map.addLayer(firestationLayer);

        document.getElementById("status").innerText =
            "CCTV " + data.cctv.length + "개 / " +
            "가로등 " + data.streetlight.length + "개 / " +
            "안심벨 " + data.safetybell.length + "개\n" +
            "경찰서 " + data.police.length + "개 / " +
            "소방서 " + data.firestation.length + "개";

        document.getElementById("cctvCheck").addEventListener("change", function() {
            this.checked ? map.addLayer(cctvLayer) : map.removeLayer(cctvLayer);
        });

        document.getElementById("streetlightCheck").addEventListener("change", function() {
            this.checked ? map.addLayer(streetlightLayer) : map.removeLayer(streetlightLayer);
        });

        document.getElementById("safetybellCheck").addEventListener("change", function() {
            this.checked ? map.addLayer(safetybellLayer) : map.removeLayer(safetybellLayer);
        });

        document.getElementById("policeCheck").addEventListener("change", function() {
            this.checked ? map.addLayer(policeLayer) : map.removeLayer(policeLayer);
        });

        document.getElementById("firestationCheck").addEventListener("change", function() {
            this.checked ? map.addLayer(firestationLayer) : map.removeLayer(firestationLayer);
        });

        let mode = null;
        let startMarker = null;
        let endMarker = null;
        let routeLines = [];
        let startPoint = null;
        let endPoint = null;

        function clearRoutes() {
            routeLines.forEach(function(line) {
                map.removeLayer(line);
            });
            routeLines = [];
        }

        document.getElementById("currentLocationBtn").addEventListener("click", function() {
            if (!navigator.geolocation) {
                document.getElementById("routeInfo").innerText =
                    "현재 위치 기능을 지원하지 않는 브라우저입니다.";
                return;
            }

            document.getElementById("routeInfo").innerText =
                "현재 위치를 가져오는 중...";

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    startPoint = L.latLng(
                        position.coords.latitude,
                        position.coords.longitude
                    );

                    if (startMarker) map.removeLayer(startMarker);
                    clearRoutes();

                    startMarker = L.marker(startPoint)
                        .addTo(map)
                        .bindPopup("현재 위치")
                        .openPopup();

                    map.setView(startPoint, 16);

                    document.getElementById("routeInfo").innerText =
                        "현재 위치가 출발지로 설정되었습니다. 목적지를 선택하세요.";
                },
                function(error) {
                    document.getElementById("routeInfo").innerText =
                        "현재 위치를 가져오지 못했습니다. 브라우저 위치 권한을 허용해주세요.";
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });

        document.getElementById("startBtn").addEventListener("click", function() {
            mode = "start";
            document.getElementById("routeInfo").innerText = "지도에서 출발지를 클릭하세요.";
        });

        document.getElementById("endBtn").addEventListener("click", function() {
            mode = "end";
            document.getElementById("routeInfo").innerText = "지도에서 목적지를 클릭하세요.";
        });

        document.getElementById("routeMode").addEventListener("change", function() {
            if (startPoint && endPoint) {
                drawMultipleRoutes(data);
            }
        });

        map.on("click", function(e) {
            if (mode === "start") {
                startPoint = e.latlng;

                if (startMarker) map.removeLayer(startMarker);
                clearRoutes();

                startMarker = L.marker(startPoint)
                    .addTo(map)
                    .bindPopup("출발지")
                    .openPopup();

                mode = null;
                document.getElementById("routeInfo").innerText =
                    "출발지 선택 완료. 목적지를 선택하세요.";
            }

            else if (mode === "end") {
                endPoint = e.latlng;

                if (endMarker) map.removeLayer(endMarker);
                clearRoutes();

                endMarker = L.marker(endPoint)
                    .addTo(map)
                    .bindPopup("목적지")
                    .openPopup();

                mode = null;
                drawMultipleRoutes(data);
            }
        });

        function drawMultipleRoutes(data) {
            if (!startPoint || !endPoint) return;

            document.getElementById("routeInfo").innerText =
                "여러 경로를 분석하는 중...";

            clearRoutes();

            fetch("/route", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    start: { lat: startPoint.lat, lng: startPoint.lng },
                    end: { lat: endPoint.lat, lng: endPoint.lng }
                })
            })
            .then(function(response) {
                if (!response.ok) throw new Error("경로 API 요청 실패");
                return response.json();
            })
            .then(function(routeData) {
                if (!routeData.routes || routeData.routes.length === 0) {
                    throw new Error("경로를 찾지 못했습니다.");
                }

                let routeResults = [];

                routeData.routes.forEach(function(route, index) {
                    const routeLatLngs = route.coordinates.map(function(coord) {
                        return [coord[1], coord[0]];
                    });

                    let safetyResult = calculateSafetyScore(routeLatLngs, data, 300);

                    routeResults.push({
                        originalIndex: index,
                        latlngs: routeLatLngs,
                        distance: route.distance,
                        duration: route.duration,
                        score: safetyResult.score,
                        counts: safetyResult.counts
                    });
                });

                const selectedMode = document.getElementById("routeMode").value;

                if (selectedMode === "shortest") {
                    routeResults.sort(function(a, b) {
                        return a.distance - b.distance;
                    });
                } else {
                    routeResults.sort(function(a, b) {
                        return b.score - a.score;
                    });
                }

                const colors = ["green", "orange", "red"];

                routeResults.forEach(function(result, i) {
                    let line = L.polyline(result.latlngs, {
                        color: colors[i] || "gray",
                        weight: i === 0 ? 7 : 4,
                        opacity: i === 0 ? 0.95 : 0.75
                    }).addTo(map);

                    line.bindPopup(
                        (i + 1) + "위 경로<br>" +
                        "추천 기준: " +
                        (selectedMode === "shortest" ? "최단거리" : "최안전") +
                        "<br>" +
                        "안전 점수: " + result.score + "점<br>" +
                        "거리: " + Math.round(result.distance) + "m<br>" +
                        "예상 시간: " + Math.round(result.duration / 60) + "분"
                    );

                    routeLines.push(line);
                });

                map.fitBounds(L.polyline(routeResults[0].latlngs).getBounds());

                let title =
                    selectedMode === "shortest"
                    ? "최단거리 기준 경로 비교 결과"
                    : "최안전 기준 경로 비교 결과";

                let text = title + "\n\n";

                routeResults.forEach(function(result, i) {
                    text +=
                        (i + 1) + "위 경로 " +
                        (i === 0 ? "(추천)" : "") + "\n" +
                        "안전 점수: " + result.score + "점\n" +
                        "거리: " + Math.round(result.distance) + "m / " +
                        "예상 시간: " + Math.round(result.duration / 60) + "분\n" +
                        "CCTV " + result.counts.cctv + "개, " +
                        "가로등 " + result.counts.streetlight + "개, " +
                        "안심벨 " + result.counts.safetybell + "개, " +
                        "경찰서 " + result.counts.police + "개, " +
                        "소방서 " + result.counts.firestation + "개\n\n";
                });

                document.getElementById("routeInfo").innerText = text;
            })
            .catch(function(error) {
                console.error(error);
                document.getElementById("routeInfo").innerText =
                    "경로를 불러오지 못했습니다. 출발지와 목적지를 다시 선택해보세요.";
            });
        }
    })
    .catch(function(error) {
        document.getElementById("status").innerText = "데이터 로딩 실패";
        console.error(error);
    });
</script>

</body>
</html>
